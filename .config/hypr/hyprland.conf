# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=desc:Shenzhen KTC Technology Group M27T6 0000000000000,2560x1440@100.00,0x0,1,cm,hdr
monitor=desc:Shenzhen KTC Technology Group H27F7 0000000000000,1920x1080@60.00,2560x180,1
monitor=,preferred,auto,1,mirror,HDMI-A-1

experimental {
#   xx_color_management_v4 = true
}

render {
  cm_fs_passthrough = false
}

workspace=1, monitor:DP-1, default:true
workspace=2, monitor:DP-1
workspace=3, monitor:DP-1
workspace=4, monitor:DP-1
workspace=5, monitor:HDMI-A-1
workspace=6, monitor:HDMI-A-1
workspace=7, monitor:HDMI-A-1
workspace=8, monitor:HDMI-A-1, default:true

env = MOZ_DISABLE_RDD_SANDBOX,1
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_CURRENT_DESKTOP,Hyprland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = _JAVA_AWT_WM_NONREPARENTING,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland,x11,*
env = CLUTTER_BACKEND,wayland
env = NVD_BACKEND,direct
env = MOZ_ENABLE_WAYLAND,1
env = OZONE_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprpolkitagent
exec-once = $HOME/Scripts/launch_waybar
exec-once = pasystray
exec-once = dunst
exec-once = hyprpaper
exec-once = sww-daemon
exec-once = jellyfin-mpv-shim

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = compose:ralt,caps:escape_shifted_capslock
    kb_rules =

    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }

    tablet {
        output = current
    }
}

general {
    gaps_in = 10
    gaps_out = 20
    border_size = 0
    layout = dwindle
}

decoration {
    rounding = 6

    shadow {
        enabled = yes
        range = 22
        render_power = 3
        color = rgba(00000066)
    }
}


animations {
    enabled = yes
    bezier = window, 0.15, 0.85, 0.25, 1
    bezier = fast, 0.1, 1, 0.4, 1

    animation = windows, 1, 1, window, popin 50%
    animation = windowsOut, 1, 2.5, fast
    animation = fade, 1, 4, fast
    animation = workspaces, 1, 2, fast
    animation = layers, 1, 2, fast, popin 95%
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_status = master
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    vrr = 0
}

opengl {
    nvidia_anti_flicker = true
}

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER
$term = ghostty
$power = $HOME/Scripts/powermenu
$spotlight = $HOME/Scripts/spotlight
$kill_active_window = $HOME/Scripts/kill_active_window

bind = $mainMod, Enter, exec, $term
bind = $mainMod, Z, exec, $term
bind = $mainMod, Q, exec, $term
bind = $mainMod, Space, exec, $spotlight
bind = $mainMod, F, fullscreen
bind = $mainMod, X, exec, $kill_active_window

bind = $mainMod, Escape, exec, $power
bind = SUPER_LALT, M, exit, 
bind = ,Print,exec, scr

bind = $mainMod, V, togglefloating, 
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrule = float on, match:class pasystray
windowrule = float on, match:class org.kde.polkit-kde-authentication-agent-1
windowrule = float on, match:class pavucontrol
windowrule = float on, match:title ^(Media viewer)$
windowrule = float on, match:title ^(Volume Control)$
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class Viewnior
windowrule = float on, match:title ^(DevTools)$
windowrule = float on, match:class file_progress
windowrule = float on, match:class confirm
windowrule = float on, match:class steamtinkerlauncher
windowrule = float on, match:class dialog
windowrule = float on, match:class download
windowrule = float on, match:class notification
windowrule = float on, match:class error
windowrule = float on, match:class confirmreset
windowrule = float on, match:title ^(Open File)$
windowrule = float on, match:title ^(branchdialog)$
windowrule = float on, match:title ^(Confirm to replace files)
windowrule = float on, match:title ^(File Operation Progress)

windowrule = float on, match:title ^(SteamTinkerLaunch-)
windowrule = float on, match:class yad

# Steam windows should float, and disable as much eye-candy in them as possible
# (otherwise it flickers/glitches a lot).
windowrule = float on, match:title ^(Steam )
windowrule = float on, match:class steam, match:title ^(Friends List)$
windowrule = min_size 1 1, match:class steam
windowrule = no_anim on,   match:class steam
windowrule = no_dim on,    match:class steam
windowrule = no_blur on,   match:class steam
windowrule = no_shadow on, match:class steam
windowrule = border_size 0, match:class steam
windowrule = immediate on, match:class steam
